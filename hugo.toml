baseURL = 'https://docs.t-0.network'
languageCode = 'en-us'
title = 't-0 Network'

[module]
    # Hugo Modules use their own proxy (default "direct" = git/VCS) and ignore the
    # GOPROXY env. Point it at the public proxy so module downloads are zips, not
    # git — the legacy protoc-gen-doc dep chain flakes on `git fetch --unshallow`.
    proxy = "https://proxy.golang.org"
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false

[markup.goldmark.renderer]
    unsafe = true

[[menu.primary]]
    name  = "Docs"
    url = "/docs/"
    identifier = "docs"
    weight = 10

[params]
    [params.docs]
        title = "t-0 Network"
        breadcrumbs = false
    [params.footer]
        copyright = "© 2026 New Settlement Technologies Inc."