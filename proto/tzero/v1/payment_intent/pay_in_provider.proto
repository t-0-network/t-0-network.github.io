syntax = "proto3";

package tzero.v1.payment_intent;

import "tzero/v1/common/common.proto";
import "tzero/v1/common/payment_method.proto";
import "buf/validate/validate.proto";
import "ivms101/v1/ivms/ivms101.proto";

/**
 * Pay-in provider surface for the Payment Intent flow.
 *
 * Pay-in providers are those who:
 * - Receive fiat payments from end-users
 * - Publish payment intent (pay-in) quotes to the network
 * - Confirm when payments are received via ConfirmFundsReceived
 * - Settles periodically with the beneficiary provider
 *
 * Provides the payment details presented to end-users for making payments.
 */
service PayInProviderService {
  /**
   * Returns the payment details (bank account, mobile money, etc.) an end-user uses
   * to send funds. The details must carry a payment reference that ties an incoming
   * payment back to its payment intent.
   */
  rpc GetPaymentDetails(GetPaymentDetailsRequest) returns (GetPaymentDetailsResponse) {
    option idempotency_level = IDEMPOTENT;
  };
}

/**
 * Request for payment details.
 */
message GetPaymentDetailsRequest {
  /**
   * The payment intent ID this request relates to.
   */
  uint64 payment_intent_id = 10 [(buf.validate.field).uint64.gt = 0];

  /*
   * This is the confirmation code to be used later with ConfirmFundsReceived endpoint to prevent accidental
   * confirmation of the wrong payment intent
   */
  string confirmation_code = 20 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];

  /**
   * Payment methods to return PaymentDetails for.
   * Each is drawn from a previously submitted quote.
   */
  repeated tzero.v1.common.PaymentMethodType payment_methods = 30 [(buf.validate.field).repeated = {
    min_items: 1
    items: {
      enum: {
        defined_only: true
        not_in: [0]
      }
    }
  }];

  /**
   * The currency for the pay-in.
   * ISO 4217 currency code (e.g., "EUR", "GBP", "KES").
   */
  string currency = 40 [(buf.validate.field).string = {
    len: 3,
    pattern: "^[A-Z]{3}$"
  }];

  /**
   * The amount to be paid in the specified currency.
   */
  tzero.v1.common.Decimal amount = 50 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      message: "amount must be greater than zero"
      expression: "this.unscaled > 0"
    }
  ];

  /**
   * Travel rule data for this payment
   */
  TravelRuleData travel_rule = 60  [(buf.validate.field).required = true];

  /**
   * The T-0 provider ID of the beneficiary provider (the FI the funds are
   * destined for). Stable, opaque identifier for the beneficiary.
   */
  uint32 beneficiary_provider_id = 70 [(buf.validate.field).uint32.gt = 0];

  message TravelRuleData {
    /**
     * The natural or legal person or legal arrangement who is identified
     * by the beneficiary provider as the receiver of the requested payment.
     */
    repeated ivms101.Person beneficiary = 20 [(buf.validate.field).repeated.min_items = 1];

    /**
     * Beneficiary provider travel rule data.
     */
    ivms101.LegalPerson beneficiary_provider = 30 [(buf.validate.field).required = true];

    /**
     * Optional travel rule data of the payer
     */
    // no validation: ivms101.Person opaque to protovalidate; structural checks delegated to travel-rule layer
    optional ivms101.Person payer = 40;
  }
}

/**
 * Response containing payment details for the requested methods.
 */
message GetPaymentDetailsResponse {
  oneof result {
    option (buf.validate.oneof).required = true;
    Details details = 10;
    Rejection rejection = 20;
  }

  message Details {
    /**
     * Payment details for each supported payment method. Each entry carries the
     * information an end-user needs to send a payment (bank account, mobile money,
     * etc.) plus a payment reference that identifies the incoming payment.
     */
    repeated tzero.v1.common.PaymentDetails payment_details = 10;
  }

  message Rejection {
    string reason = 10;
  }
}
